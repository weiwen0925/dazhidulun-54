<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px; --primary:#2C1810; --primary-light:#5B3A29;
  --shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  line-height:1.8;
  scrollbar-width:none;-ms-overflow-style:none;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
*{-webkit-user-drag:none;}
img{-webkit-user-drag:none;pointer-events:none;}

a{color:var(--accent);text-decoration:none;}
a:hover{color:var(--accent-red);}

/* ====== 側欄 ====== */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);writing-mode:horizontal-tb;text-orientation:mixed;
  text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:3px 4px;color:var(--sbText);font-family:"Noto Sans TC",sans-serif;
  text-decoration:none;transition:.25s;cursor:pointer;width:100%;}
.sb-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--sbText);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  font-weight:500;transition:.25s;}
.sb-label{font-size:10.5px;letter-spacing:1px;opacity:.75;text-align:center;line-height:1.3;}
.sb-item:hover .sb-circle{border-color:var(--gold);color:var(--gold);}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--gold);
  box-shadow:0 0 14px rgba(184,134,11,.55);}
.sb-item.active .sb-label{color:var(--gold);opacity:1;}

/* 漢堡（手機版） */
#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:130;
  width:42px;height:42px;border:0;border-radius:8px;
  background:var(--sbBg);color:var(--gold);font-size:22px;cursor:pointer;}

/* ====== Main ====== */
.main{margin-left:var(--sbW);padding:0;}

/* ====== Hero ====== */
.site-hero{position:relative;background:var(--headGrad);color:#f0e6d2;
  padding:64px 24px 52px;text-align:center;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;font-size:380px;
  top:-60px;right:-40px;opacity:.04;color:var(--goldL);font-weight:900;letter-spacing:30px;
  pointer-events:none;font-family:"Noto Serif TC",serif;}
.site-hero::after{content:"卷五十四";position:absolute;font-size:200px;
  bottom:-80px;left:-30px;opacity:.03;color:var(--goldL);font-weight:900;letter-spacing:24px;
  pointer-events:none;font-family:"Noto Serif TC",serif;}
.hero-eyebrow{position:relative;font-family:"Noto Sans TC",sans-serif;font-size:13px;
  letter-spacing:6px;color:var(--goldL);opacity:.85;margin-bottom:18px;}
.hero-title{position:relative;font-size:54px;font-weight:900;letter-spacing:8px;
  color:#fff;margin:8px 0 14px;text-shadow:0 2px 12px rgba(0,0,0,.4);}
.hero-subtitle{position:relative;font-size:18px;letter-spacing:3px;color:#e8dcc0;margin-bottom:10px;}
.hero-range{position:relative;font-family:"Noto Sans TC",sans-serif;font-size:14px;
  letter-spacing:3px;color:var(--goldL);opacity:.85;margin-top:18px;
  padding-top:18px;border-top:1px solid rgba(212,168,75,.3);
  display:inline-block;}

/* ====== Preface ====== */
.preface{max-width:920px;margin:38px auto 12px;padding:30px 32px;
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:12px;box-shadow:0 3px 14px rgba(91,58,41,.08);}
.preface-title{font-family:"Noto Sans TC",sans-serif;font-size:13px;
  letter-spacing:6px;color:var(--gold);text-align:center;
  margin:0 0 14px;font-weight:600;}
.preface p{margin:0 0 12px;color:var(--text2);line-height:2;font-size:16px;}
.preface p:last-child{margin-bottom:0;}

/* ====== TOC ====== */
.toc-section{max-width:1100px;margin:32px auto 36px;padding:0 24px;}
.toc-title{text-align:center;font-size:30px;font-weight:700;color:var(--accent);
  letter-spacing:14px;margin:0 0 8px;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:14px;
  letter-spacing:3px;color:var(--text-muted);margin:0 0 28px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;}
.toc-card{display:flex;align-items:center;gap:14px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:16px 18px;text-decoration:none;color:var(--text);
  transition:transform .25s,box-shadow .25s,border-color .25s;cursor:pointer;}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(91,58,41,.12);
  border-color:var(--gold);}
.toc-num{flex-shrink:0;width:36px;height:36px;border-radius:50%;
  background:var(--gold);color:#fff;display:flex;align-items:center;
  justify-content:center;font-family:"Noto Sans TC",sans-serif;
  font-size:16px;font-weight:700;}
.toc-name{font-weight:600;color:var(--accent);font-size:16px;line-height:1.5;margin-bottom:2px;}
.toc-sub{font-family:"Noto Sans TC",sans-serif;font-size:12px;color:var(--text-muted);
  letter-spacing:1.5px;line-height:1.5;}

/* ====== Chapter section ====== */
.chapter{margin:36px 0;}
.ch-head{background:var(--headGrad);color:#f0e6d2;
  padding:36px 24px;text-align:center;border-radius:12px 12px 0 0;
  max-width:980px;margin:0 auto;position:relative;}
.ch-head::after{content:"";position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  width:64px;height:2px;background:var(--goldL);opacity:.7;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:5px;
  color:var(--goldL);opacity:.85;margin-bottom:10px;}
.ch-name{font-size:30px;font-weight:700;letter-spacing:5px;color:#fff;margin:6px 0 8px;}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:3px;
  color:#e8dcc0;opacity:.9;margin-top:12px;}

.ch-body{max-width:980px;margin:0 auto;padding:0 16px 18px;}

/* 橋接卡 */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:11px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}

/* iframe */
.ch-frame{display:block;width:100%;border:0;
  background:#fffdf7;border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}

.next-link{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:14px;
  letter-spacing:2px;color:var(--gold);text-decoration:none;
  border:1px solid var(--gold);padding:8px 18px;border-radius:24px;
  margin-top:6px;transition:.25s;}
.next-link:hover{background:var(--gold);color:#fff;}

/* ====== 底部進度膠囊 ====== */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;
}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* 回頂按鈕 */
#backTop{position:fixed;right:24px;bottom:80px;width:44px;height:44px;
  border-radius:50%;background:var(--sbBg);color:var(--gold);
  border:1px solid rgba(184,134,11,.5);font-size:20px;cursor:pointer;
  opacity:0;pointer-events:none;transition:.3s;z-index:115;}
#backTop.show{opacity:1;pointer-events:auto;}

/* footer */
.site-footer{padding:24px 16px;text-align:center;color:var(--text-muted);
  font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:3px;
  border-top:1px solid var(--border);margin-top:20px;}

/* ====== 響應式 ====== */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:.3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .hero-title{font-size:38px;letter-spacing:4px;}
  .ch-name{font-size:24px;letter-spacing:3px;}
  .ch-head,.ch-body{padding-left:14px;padding-right:14px;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .hero-title{font-size:30px;}
  .ch-name{font-size:20px;}
  .toc-grid{grid-template-columns:1fr;}
}

/* ============ 1.2x 字級放大（新卷預設）============ */
body{font-size:20px!important;}
.hero-title,.site-hero h1{font-size:56px!important;}
.hero-subtitle,.site-hero .hero-subtitle{font-size:20px!important;}
.hero-eyebrow{font-size:15px!important;}
.hero-range{font-size:17px!important;}
.preface p,.preface-text p{font-size:19px!important;line-height:2.1!important;}
.preface h2,.preface-title{font-size:18px!important;letter-spacing:8px!important;}
.toc-title{font-size:34px!important;}
.toc-desc{font-size:17px!important;}
.toc-name{font-size:19.5px!important;line-height:1.7!important;}
.toc-num{font-size:17px!important;}
.toc-sub{font-size:14px!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.bridge-label{font-size:12.5px!important;letter-spacing:2.2px!important;}
.ch-num{font-size:18px!important;}
.ch-name{font-size:34px!important;}
.ch-sub,.ch-desc,.ch-subtitle{font-size:17px!important;}
.next-link{font-size:17px!important;}
.read-progress{font-size:14px!important;padding:9px 24px!important;}
.read-progress .rp-bar{width:148px!important;height:4px!important;}
.read-progress .rp-pct{font-size:13px!important;}
.read-progress .rp-label{font-size:12px!important;}
.sb-circle{font-size:15px!important;}
.sb-label{font-size:11.5px!important;}
.site-footer,.site-footer p{font-size:15px!important;}

<script>
(function(){
  // ===== sticky 卷名回頂 =====
  var sbBrand=document.getElementById('sbBrand');
  if(sbBrand){
    sbBrand.addEventListener('click',function(e){
      e.preventDefault();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  }

  // ===== 漢堡選單 =====
  var sb=document.getElementById('sb');
  var tog=document.getElementById('sbToggle');
  if(tog){
    tog.addEventListener('click',function(){ sb.classList.toggle('open'); });
  }

  // ===== Anti-copy =====
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('mousedown',function(e){if(e.button===2)blk(e);},true);
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);

  // ===== 進度條 =====
  var rpFill=document.getElementById('rpFill');
  var rpPct=document.getElementById('rpPct');
  function updateProgress(){
    var sh=document.documentElement.scrollHeight-window.innerHeight;
    var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
    if(rpFill) rpFill.style.width=pct+'%';
    if(rpPct) rpPct.textContent=Math.round(pct)+'%';
  }
  window.addEventListener('scroll',updateProgress,{passive:true});
  updateProgress();

  // ===== 接近頁尾淡出進度膠囊 =====
  var cap=document.getElementById('readProgress');
  if(cap){
    var f2=document.querySelector('.site-footer');
    var targets=[];
    if(f2) targets.push(f2);
    if(targets.length && 'IntersectionObserver' in window){
      var io=new IntersectionObserver(function(entries){
        var any=entries.some(function(e){return e.isIntersecting;});
        cap.classList.toggle('hide-near-end',!!any);
      },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
      targets.forEach(function(t){io.observe(t);});
    }
  }

  // ===== iframe 自動高度 =====
  function resizeFrame(f){
    try{
      var d=f.contentDocument||f.contentWindow.document;
      if(!d||!d.body) return;
      d.body.style.minHeight='0';
      d.body.style.height='auto';
      if(d.documentElement){
        d.documentElement.style.minHeight='0';
        d.documentElement.style.height='auto';
      }
      var h=d.body.scrollHeight;
      if(h>100){
        f.style.height=h+'px';
        f.style.minHeight='0';
      }
    }catch(e){}
  }
  function resizeAllFrames(){
    document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
    updateProgress();
  }
  function setupFrame(f){
    var tries=0;
    function tick(){
      tries++;
      resizeFrame(f);
      if(tries<30) setTimeout(tick,200);
    }
    if(f.contentDocument && f.contentDocument.readyState==='complete'){
      tick();
    } else {
      f.addEventListener('load',tick);
    }
  }
  document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
  var rzT;
  window.addEventListener('resize',function(){
    clearTimeout(rzT);
    rzT=setTimeout(resizeAllFrames,200);
  });

  // 錨點點擊防錯跳：對所有 #xxx 連結平滑捲動
  document.addEventListener('click',function(e){
    var a=e.target;
    while(a && a.tagName!=='A') a=a.parentElement;
    if(!a) return;
    var h=a.getAttribute('href');
    if(!h || h.charAt(0)!=='#' || h.length<2) return;
    var id=h.substring(1);
    var el=document.getElementById(id);
    if(!el) return;
    e.preventDefault();
    resizeAllFrames();
    setTimeout(function(){
      resizeAllFrames();
      var rect=el.getBoundingClientRect();
      var y=window.scrollY+rect.top-20;
      window.scrollTo({top:y,behavior:'smooth'});
    },60);
  },true);

  // 前 15 秒持續輪詢
  var _rt=0,_riv=setInterval(function(){
    _rt++; resizeAllFrames();
    if(_rt>50) clearInterval(_riv);
  },300);

  // ===== 側欄高亮 + 回頂按鈕 =====
  var sbItems=document.querySelectorAll('.sb-item');
  var chapters=document.querySelectorAll('.chapter');
  var bt=document.getElementById('backTop');
  function onScroll(){
    var sy=window.scrollY;
    if(bt){ bt.classList.toggle('show', sy>600); }
    var threshold=window.innerHeight*0.35;
    var active=null;
    chapters.forEach(function(ch){
      var t=ch.getBoundingClientRect().top;
      if(t<threshold) active=ch;
    });
    sbItems.forEach(function(it){it.classList.remove('active');});
    if(active){
      var n=active.getAttribute('data-ch');
      var item=document.querySelector('.sb-item[data-ch="'+n+'"]');
      if(item) item.classList.add('active');
    }
  }
  window.addEventListener('scroll',onScroll,{passive:true});
  onScroll();
  if(bt){ bt.addEventListener('click',function(){ window.scrollTo({top:0,behavior:'smooth'}); }); }
})();
</script>

(function(){

  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
