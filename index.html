<style>

*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{margin:0;background:var(--bg);color:var(--text);font-size:20px;

a{color:inherit;text-decoration:none;}

#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;background:var(--sbBg);
  color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;font-family:"Noto Sans TC",sans-serif;
  font-size:11px;letter-spacing:2px;color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 80%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;text-decoration:none;cursor:pointer;
  transition:color .25s;display:block;border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;padding-top:6px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;
  padding:5px 4px;cursor:pointer;transition:background .2s;border-radius:6px;}
.sb-item:hover{background:rgba(184,134,11,.14);}
.sb-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:600;
  border:1px solid rgba(212,196,168,.4);color:var(--sbText);transition:all .2s;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;text-align:center;opacity:.86;letter-spacing:.3px;line-height:1.3;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--goldL);
  box-shadow:0 0 12px rgba(184,134,11,.7);}
.sb-item.active .sb-label{color:var(--goldL);opacity:1;}

#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:130;width:42px;height:42px;
  border:none;border-radius:8px;background:var(--sbBg);color:var(--gold);font-size:20px;cursor:pointer;}

.main{margin-left:var(--sbW);}

.site-hero{position:relative;background:var(--headGrad);color:#fff;text-align:center;
  padding:78px 24px 64px;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:280px;font-weight:900;color:#fff;opacity:.04;
  font-family:"Noto Serif TC",serif;pointer-events:none;white-space:nowrap;}
.hero-title{position:relative;font-size:56px;font-weight:900;color:var(--goldL);margin:0 0 18px;letter-spacing:4px;}
.hero-subtitle{position:relative;font-size:20px;color:#e8ddc8;margin:0 0 8px;letter-spacing:2px;}
.hero-sub{position:relative;font-size:18px;color:#cdbfa3;margin:0 0 18px;letter-spacing:1px;}
.hero-range{position:relative;display:inline-block;font-family:"Noto Sans TC",sans-serif;

.preface{max-width:860px;margin:48px auto 0;padding:0 28px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);margin:0 0 22px;letter-spacing:3px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 16px;text-indent:2em;}

.toc-section{max-width:1100px;margin:54px auto 10px;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);margin:0 0 10px;letter-spacing:8px;}

.ch-head{background:var(--headGrad);color:#fff;text-align:center;padding:48px 24px 42px;position:relative;}

.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);

  box-shadow:0 2px 10px rgba(91,58,41,.06);}

.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;}

.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);

.next-link{display:inline-block;margin:6px 0 0;font-family:"Noto Sans TC",sans-serif;
  font-size:17px;color:var(--accent);border-bottom:1px dashed var(--accentL);padding-bottom:2px;cursor:pointer;}
.next-link:hover{color:var(--gold);}

.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;

.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

@media(max-width:900px){

  .main{margin-left:0;}
  .hero-title{font-size:40px;} .ch-name{font-size:27px;} .site-hero::before{font-size:170px;}
}
@media(max-width:600px){

}

<button id="backTop">↑</button>
<script>
var sbBrand=document.getElementById('sbBrand');
if(sbBrand){sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});}
var sbToggle=document.getElementById('sbToggle'),sb=document.getElementById('sb');
if(sbToggle){sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});}
var backTop=document.getElementById('backTop');
function resizeFrame(f){try{var d=f.contentDocument||f.contentWindow.document;if(!d||!d.body)return;
  d.body.style.minHeight='0';d.body.style.height='auto';
  if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
  var h=d.body.scrollHeight;if(h>100){f.style.height=h+'px';f.style.minHeight='0';}}catch(e){}}
function resizeAllFrames(){document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();}
function setupFrame(f){var tries=0;function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}else{f.addEventListener('load',tick);}}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});
var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';if(rpPct)rpPct.textContent=Math.round(pct)+'%';
  if(backTop)backTop.style.display=window.scrollY>600?'block':'none';}
window.addEventListener('scroll',updateProgress,{passive:true});updateProgress();
if(backTop){backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});}
var chapters=Array.prototype.slice.call(document.querySelectorAll('.chapter'));
var sbItems=Array.prototype.slice.call(document.querySelectorAll('.sb-item'));
function highlight(){var idx=-1;for(var i=0;i<chapters.length;i++){
  if(chapters[i].getBoundingClientRect().top<window.innerHeight*0.35)idx=i;}
  sbItems.forEach(function(it,i){it.classList.toggle('active',i===idx);});}
window.addEventListener('scroll',highlight,{passive:true});highlight();
document.addEventListener('click',function(e){var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
  if(!a)return;var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);var el=document.getElementById(id);if(!el)return;e.preventDefault();
  if(sb)sb.classList.remove('open');
  resizeAllFrames();setTimeout(function(){resizeAllFrames();
    var rect=el.getBoundingClientRect();var y=window.scrollY+rect.top-20;
    window.scrollTo({top:y,behavior:'smooth'});},60);},true);
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);
(function(){var cap=document.getElementById('readProgress');if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var t=document.querySelector('[data-wy-notice="v2"]')||document.querySelector('.site-footer');if(!t)return;
  if('IntersectionObserver' in window){var io=new IntersectionObserver(function(es){
    setHide(es.some(function(e){return e.isIntersecting;}));},{rootMargin:'0px 0px -20px 0px',threshold:0.01});io.observe(t);}
})();
(function(){var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,blk,true);});
  document.addEventListener('keydown',function(e){var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U')){blk(e);}
    if(k==='F12')blk(e);if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}},true);})();
</script>

      e.preventDefault(); e.stopPropagation();

<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-54-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
